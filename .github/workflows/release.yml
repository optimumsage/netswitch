name: "Release"

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, ubuntu-22.04, windows-latest]

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: debug info
        run: |
          node -v
          npm -v

      - name: install frontend dependencies
        working-directory: netswitch-gui
        run: npm ci

      - name: build daemon
        run: cargo build --release --manifest-path netswitch-daemon/Cargo.toml

      - name: prepare tauri resources (unix)
        if: matrix.platform != 'windows-latest'
        run: |
          mkdir -p netswitch-gui/src-tauri/bin
          mkdir -p netswitch-gui/src-tauri/service
          cp target/release/netswitch-daemon netswitch-gui/src-tauri/bin/
          cp service/* netswitch-gui/src-tauri/service/
          cp scripts/setup-daemon.sh netswitch-gui/src-tauri/bin/

      - name: prepare tauri resources (windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -Path "netswitch-gui/src-tauri/bin" -ItemType Directory -Force
          New-Item -Path "netswitch-gui/src-tauri/service" -ItemType Directory -Force
          Copy-Item -Path "target/release/netswitch-daemon.exe" -Destination "netswitch-gui/src-tauri/bin/" -Force
          Copy-Item -Path "service/*" -Destination "netswitch-gui/src-tauri/service/" -Force
          Copy-Item -Path "scripts/setup-daemon.ps1" -Destination "netswitch-gui/src-tauri/bin/" -Force

      - name: build tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__ # tauri-action replaces this with app version
          releaseName: "Netswitch v__VERSION__"
          releaseBody: "Automated release of Netswitch"
          releaseDraft: true
          prerelease: false
          projectPath: netswitch-gui
